name: Node.js CI/CD Pipeline
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Dependencies
        run: npm install
      - name: Build Stage
        run: npm run build
      - name: Test Stage
        run: npm test
      - name: Deployment Stage
        env:
          app_key: ${{ secrets.app_key }}
        run: echo "Deployment Successfu1"
